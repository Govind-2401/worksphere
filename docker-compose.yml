

services:

  mysql:
    image: mysql:8.4
    container_name: worksphere-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Govind@2401
      MYSQL_DATABASE: worksphere

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - worksphere-network

  app:
    build: .

    container_name: worksphere-app

    depends_on:
      - mysql

    restart: always

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/worksphere
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Govind@2401

    volumes:
      - ../uploads:/app/uploads

    networks:
      - worksphere-network

networks:
  worksphere-network:

volumes:
  mysql-data: